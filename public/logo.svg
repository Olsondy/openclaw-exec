<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0F0F" />
      <stop offset="100%" stop-color="#0A0505" />
    </linearGradient>
    
    <!-- Lobster Red Gradients -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D" />
      <stop offset="50%" stop-color="#E60000" />
      <stop offset="100%" stop-color="#990000" />
    </linearGradient>
    
    <linearGradient id="brightRed" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7575" />
      <stop offset="100%" stop-color="#FF1A1A" />
    </linearGradient>

    <!-- Tech/Cypher Cyan highlights -->
    <linearGradient id="cyanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#24C8DB" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#24C8DB" stop-opacity="0.2" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bgGrad)" />

  <!-- Tech Circle Background -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#FF4D4D" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="8 8" />
  <circle cx="200" cy="200" r="100" fill="none" stroke="#FF4D4D" stroke-opacity="0.05" stroke-width="1" />
  
  <g transform="translate(0, 10)">
    <!-- Lobster Body (Abstract Geometric) -->
    <path d="M 200 120 L 230 180 L 220 260 L 200 300 L 180 260 L 170 180 Z" fill="url(#redGrad)" filter="url(#glow)" />
    <!-- Body Segment Lines -->
    <path d="M 175 190 L 225 190 M 180 220 L 220 220 M 185 250 L 215 250 M 190 275 L 210 275" fill="none" stroke="#FF1A1A" stroke-width="3" />

    <!-- Lobster Tail -->
    <path d="M 200 300 L 230 330 L 210 350 L 200 340 L 190 350 L 170 330 Z" fill="url(#redGrad)" />
    
    <!-- Left Giant Claw (OpenClaw) -->
    <g transform="rotate(-15, 120, 150)">
      <!-- Main Arm -->
      <path d="M 170 160 Q 120 170 100 200" fill="none" stroke="url(#redGrad)" stroke-width="20" stroke-linecap="round" />
      <!-- Big Claw Bottom -->
      <path d="M 70 180 C 40 160 50 110 90 90 C 120 70 140 110 120 150 Z" fill="url(#brightRed)" filter="url(#glow)" />
      <!-- Big Claw Top (Pincer) -->
      <path d="M 85 95 C 100 50 150 40 160 80 C 160 110 130 130 115 140 Z" fill="url(#brightRed)" filter="url(#glow)" />
      <!-- Inner tech circuitry in claw -->
      <path d="M 90 100 L 110 120 L 130 100" fill="none" stroke="#24C8DB" stroke-width="3" filter="url(#glow)" />
      <circle cx="110" cy="120" r="6" fill="#24C8DB" filter="url(#glow)" />
    </g>

    <!-- Right Giant Claw (OpenClaw) -->
    <g transform="rotate(15, 280, 150)">
      <!-- Main Arm -->
      <path d="M 230 160 Q 280 170 300 200" fill="none" stroke="url(#redGrad)" stroke-width="20" stroke-linecap="round" />
      <!-- Big Claw Bottom -->
      <path d="M 330 180 C 360 160 350 110 310 90 C 280 70 260 110 280 150 Z" fill="url(#brightRed)" filter="url(#glow)" />
      <!-- Big Claw Top (Pincer) -->
      <path d="M 315 95 C 300 50 250 40 240 80 C 240 110 270 130 285 140 Z" fill="url(#brightRed)" filter="url(#glow)" />
      <!-- Inner tech circuitry in claw -->
      <path d="M 310 100 L 290 120 L 270 100" fill="none" stroke="#24C8DB" stroke-width="3" filter="url(#glow)" />
      <circle cx="290" cy="120" r="6" fill="#24C8DB" filter="url(#glow)" />
    </g>

    <!-- Antennae / Data Streams -->
    <path d="M 190 120 Q 150 50 100 60" fill="none" stroke="url(#cyanLine)" stroke-width="3" />
    <circle cx="100" cy="60" r="4" fill="#24C8DB" filter="url(#glow)" />
    
    <path d="M 210 120 Q 250 50 300 60" fill="none" stroke="url(#cyanLine)" stroke-width="3" />
    <circle cx="300" cy="60" r="4" fill="#24C8DB" filter="url(#glow)" />

    <!-- Center Node (AI Core) -->
    <circle cx="200" cy="150" r="15" fill="#1A0F0F" stroke="#24C8DB" stroke-width="4" filter="url(#glow)" />
    <circle cx="200" cy="150" r="5" fill="#24C8DB" />
    
    <!-- Nodes on body connecting to mesh -->
    <circle cx="200" cy="220" r="4" fill="#FFFFFF" />
    <circle cx="200" cy="275" r="4" fill="#FFFFFF" />
    <path d="M 200 150 L 200 275" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="4 4" />
  </g>
</svg>
